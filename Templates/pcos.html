<!DOCTYPE html>
<html>
<head>
    <title>PCOS Risk Checker - NARIBANDHU</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <h2>🌸 PCOS Risk Checker 🌸</h2>

    <form action="/pcos" method="POST">

        <label>Irregular periods?</label>
        <select name="irregular">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label>Sudden weight gain?</label>
        <select name="weight">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label>Acne problems?</label>
        <select name="acne">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label>Excess hair growth?</label>
        <select name="hair">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label>Hair fall / thinning?</label>
        <select name="hairfall">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <button type="submit">Check Risk</button>
    </form>

    <br>
    <a href="/">⬅ Back</a>
</div>
    
</body>    
</html>
