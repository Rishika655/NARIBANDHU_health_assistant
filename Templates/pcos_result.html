<!DOCTYPE html>
<html>
<head>
    <title>PCOS Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <h2>🌸 Your PCOS Risk Level 🌸</h2>

    <div class="result-box {{ color }}">
        {{ result }}
    </div>

    <p>{{ message }}</p>

    <h3>🌿 Recommended Tips 🌿</h3>

    <ul class="tips">
        {% for tip in tips %}
            <li>{{ tip }}</li>
        {% endfor %}
    </ul> 

    <br>
    <a href="/pcos">🔁 Check Again</a><br><br>
    <a href="/">🏠 Home</a>
</div>
</body>
</html>
